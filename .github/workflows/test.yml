name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Verify DB schema
        run: python -c "from fusion_council_service.db import initialize_schema"

      - name: Run tests
        env:
          DATABASE_PATH: ":memory:"
          SERVICE_API_KEYS: "ci-key-1"
          SERVICE_ADMIN_API_KEYS: "ci-admin-key"
          MINIMAX_TOKEN_PLAN_API_KEY: "ci-minimax-key"
          OLLAMA_API_KEY: "ci-ollama-key"
          MINIMAX_ANTHROPIC_BASE_URL: "https://api.minimax.io/anthropic"
          OLLAMA_BASE_URL: "https://ollama.com"
        run: pytest tests/ -q --tb=short

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install ruff
        run: uv pip install --system ruff

      - name: Lint
        run: ruff check src/ tests/ --select=E,F --ignore=E501