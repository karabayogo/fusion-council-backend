name: Build and Push Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'src/**'
      - 'pyproject.toml'
      - 'pyproject.toml.lock'
      - 'uv.lock'
      - 'alembic.ini'
      - 'config/**'
      - 'migrations/**'
      - 'scripts/integration_test.py'
      - 'tests/**'
      - '.github/workflows/docker-publish.yml'
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set short SHA
        id: short_sha
        run: echo "sha7=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/fusion-council-backend
          tags: |
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'workflow_dispatch' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
          outputs: type=docker,dest=/tmp/fusion-council-api.tar

      # Verify image exists in GHCR before proceeding
      - name: Verify image is pullable from GHCR
        if: github.event_name != 'workflow_dispatch'
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/fusion-council-backend:sha-${{ steps.short_sha.outputs.sha7 }}"
          echo "Verifying ${IMAGE} is accessible in GHCR..."
          MAX_RETRIES=5
          RETRY_DELAY=10
          for i in $(seq 1 ${MAX_RETRIES}); do
            if docker buildx imagetools inspect "${IMAGE}" > /dev/null 2>&1; then
              echo "Image verified successfully on attempt ${i}."
              exit 0
            fi
            echo "Attempt ${i}/${MAX_RETRIES} failed — GHCR may still be indexing. Retrying in ${RETRY_DELAY}s..."
            sleep ${RETRY_DELAY}
          done
          echo "ERROR: Image ${IMAGE} not accessible after ${MAX_RETRIES} attempts."
          echo "Image verification failed after ${MAX_RETRIES} attempts."
          exit 1

      - name: Get image digest
        if: github.event_name != 'workflow_dispatch'
        id: digest
        run: |
          digest=$(docker inspect ghcr.io/${{ github.repository_owner }}/fusion-council-backend:sha-${{ steps.short_sha.outputs.sha7 }} --format='{{index .RepoDigests 0}}' | cut -d'@' -f2)
          echo "digest=$digest" >> $GITHUB_OUTPUT
          echo "Image digest: $digest"

      - name: Run smoke test
        if: github.event_name != 'workflow_dispatch'
        run: |
          docker load --input /tmp/fusion-council-api.tar || true
          docker run --rm ghcr.io/${{ github.repository_owner }}/fusion-council-backend:sha-${{ steps.short_sha.outputs.sha7 }} --help || true

      # Notify homelab-gitops so the auto-roll-forward workflow can bump the
      # chart appVersion. The 5-min schedule is the safety net; this dispatch
      # gives instant promotion on a successful push. Failure here is non-fatal
      # — the schedule will catch the same image within 5 minutes.
      - name: Notify homelab-gitops of new image
        if: github.event_name != 'workflow_dispatch'
        continue-on-error: true
        env:
          HOMELAB_GITOPS_TOKEN: ${{ secrets.HOMELAB_GITOPS_TOKEN }}
        run: |
          if [ -z "${HOMELAB_GITOPS_TOKEN:-}" ]; then
            echo "HOMELAB_GITOPS_TOKEN not set — skipping dispatch. Schedule will pick up within 5 min."
            exit 0
          fi
          SHORT_SHA="sha-${{ steps.short_sha.outputs.sha7 }}"
          echo "Dispatching backend_image_published (${SHORT_SHA}) to karabayogo/homelab-gitops"
          curl -sS -X POST \
            -H "Authorization: Bearer ${HOMELAB_GITOPS_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/karabayogo/homelab-gitops/dispatches" \
            -d "{\"event_type\": \"backend_image_published\", \"client_payload\": {\"sha\": \"${SHORT_SHA}\"}}"
          echo "Dispatch sent."

