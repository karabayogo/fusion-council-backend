name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set short SHA
        id: short_sha
        run: echo "sha7=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/fusion-council-backend
          tags: |
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'workflow_dispatch' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
          outputs: type=docker,dest=/tmp/fusion-council-api.tar

      # ── FIX A: Verify image exists in GHCR before touching k8s-workbench ──
      # This prevents committing a SHA to git that was never successfully pushed.
      # Use docker buildx imagetools inspect (lightweight manifest check, no layer pull).
      # Retry up to 5 times with 10s backoff because GHCR may lag after push.
      - name: Verify image is pullable from GHCR
        if: github.event_name != 'workflow_dispatch'
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/fusion-council-backend:sha-${{ steps.short_sha.outputs.sha7 }}"
          echo "Verifying ${IMAGE} is accessible in GHCR..."
          MAX_RETRIES=5
          RETRY_DELAY=10
          for i in $(seq 1 ${MAX_RETRIES}); do
            if docker buildx imagetools inspect "${IMAGE}" > /dev/null 2>&1; then
              echo "Image verified successfully on attempt ${i}."
              exit 0
            fi
            echo "Attempt ${i}/${MAX_RETRIES} failed — GHCR may still be indexing. Retrying in ${RETRY_DELAY}s..."
            sleep ${RETRY_DELAY}
          done
          echo "ERROR: Image ${IMAGE} not accessible after ${MAX_RETRIES} attempts."
          echo "Refusing to update k8s-workbench with an unverified SHA."
          exit 1

      - name: Get image digest
        if: github.event_name != 'workflow_dispatch'
        id: digest
        run: |
          digest=$(docker inspect ghcr.io/${{ github.repository_owner }}/fusion-council-backend:sha-${{ steps.short_sha.outputs.sha7 }} --format='{{index .RepoDigests 0}}' | cut -d'@' -f2)
          echo "digest=$digest" >> $GITHUB_OUTPUT
          echo "Image digest: $digest"

      - name: Record production image digest
        if: github.event_name != 'workflow_dispatch' && github.ref == 'refs/heads/main'
        run: |
          python <<'PY'
          from pathlib import Path

          # Get digest from previous step (set via GITHUB_OUTPUT)
          digest = "${{ steps.digest.outputs.digest }}"
          if not digest:
              print("No digest found — check if digest step ran")
              raise SystemExit(1)

          # Write digest to a tracking file in k8s-workbench
          path = Path('k8s-workbench/values/fusion-council-api/digest.txt')
          path.write_text(digest.strip() + '\n')
          print(f"Digest recorded: {digest.strip()}")
          PY

      - name: Run smoke test (when not workflow_dispatch)
        if: github.event_name != 'workflow_dispatch'
        run: |
          docker load --input /tmp/fusion-council-api.tar || true
          docker run --rm ghcr.io/${{ github.repository_owner }}/fusion-council-backend:sha-${{ steps.short_sha.outputs.sha7 }} --help || true

      # ── FIX B: All k8s-workbench steps consolidated ─────────────────────────
      # Separated from build to make the two-step pattern explicit:
      # Step 1 (above): build + push image to GHCR
      # Step 2 (below): update k8s-workbench — only runs if Step 1 succeeded
      # Alert on failure: if image was pushed but k8s-workbench was NOT updated
      - name: Checkout k8s-workbench
        if: github.event_name != 'workflow_dispatch' && github.ref == 'refs/heads/main'
        uses: actions/checkout@v5
        with:
          repository: karabayogo/k8s-workbench
          token: ${{ secrets.K8S_WORKBENCH_PUSH_TOKEN }}
          path: k8s-workbench

      - name: Update k8s-workbench dev image tag
        if: github.event_name != 'workflow_dispatch' && github.ref == 'refs/heads/main'
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path('k8s-workbench/values/fusion-council-api/dev.yaml')
          original = path.read_text()
          lines = original.splitlines()
          updated = []
          in_image_block = False
          replaced = False

          for line in lines:
              stripped = line.strip()
              if stripped == 'image:':
                  in_image_block = True
                  updated.append(line)
                  continue
              if in_image_block and line and not line.startswith(' '):
                  in_image_block = False
              if in_image_block and stripped.startswith('tag:'):
                  updated.append('  tag: "sha-${{ steps.short_sha.outputs.sha7 }}"')
                  replaced = True
                  continue
              updated.append(line)

          if not replaced:
              raise SystemExit('image.tag not found in values/fusion-council-api/dev.yaml')

          path.write_text('\n'.join(updated) + '\n')
          PY

      - name: Commit and push k8s-workbench dev image tag
        if: github.event_name != 'workflow_dispatch' && github.ref == 'refs/heads/main'
        run: |
          set -eo pipefail
          cd k8s-workbench
          if git diff --quiet -- values/fusion-council-api/dev.yaml; then
            echo "No k8s-workbench changes to commit — image SHA already recorded."
            exit 0
          fi
          git config user.email "ci@fusion-council.local"
          git config user.name "GitHub Actions CI"
          git add values/fusion-council-api/dev.yaml
          git commit -m "Update fusion-council-api dev image to sha-${{ github.sha }}"
          if ! git push; then
            echo "WARNING: Image sha-${{ github.sha }} was pushed to GHCR but k8s-workbench update FAILED."
            echo "ACTION REQUIRED: Manually update karabayogo/k8s-workbench with the correct SHA."
            exit 1
          fi
          echo "k8s-workbench updated successfully."
