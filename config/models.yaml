  - alias: primary-researcher
    provider: opencode_go
    provider_model: qwen3.7-max
    enabled: true
    family: qwen
    tier: frontier
    role_bias: primary
    timeout_seconds: 600

  - alias: reviewer
    provider: opencode_go
    provider_model: kimi-k2.6
    enabled: true
    family: kimi
    tier: frontier
    role_bias: reviewer
    timeout_seconds: 600 

  - alias: backup
    provider: opencode_go
    provider_model: qwen3.6-plus
    enabled: true
    family: qwen
    tier: frontier
    role_bias: backup
    timeout_seconds: 600

  - alias: synthesizer
    provider: opencode_go
    provider_model: deepseek-v4-pro
    enabled: true
    family: deepseek
    tier: frontier
    role_bias: synthesis
    timeout_seconds: 600

  - alias: creative
    provider: minimax_token_plan
    provider_model: MiniMax-M3
    enabled: true
    family: minimax
    tier: frontier
    role_bias: creative
    timeout_seconds: 600

  - alias: verifier
    provider: opencode_go
    provider_model: glm-5.1
    enabled: true
    family: glm
    tier: frontier
    role_bias: verification
    timeout_seconds: 600